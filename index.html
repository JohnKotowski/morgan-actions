<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Morgan · Action Items</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- europe-trip styles loaded first so the leg-detail content (.leg-header,
       .section, .callout, .day, .poi, .option, .btn, etc.) renders correctly
       when injected. Our own style.css loads second to win cascade conflicts
       on shared classes/vars. -->
  <link rel="stylesheet" href="https://johnkotowski.github.io/europe-trip-2026/app.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="head">
    <h1 id="page-title">Action Items</h1>
    <button id="refresh" aria-label="Refresh" title="Refresh">↻</button>
  </header>

  <!-- View: Action Items (default) -->
  <main id="view-actions" class="view">
    <div class="tile-stack">
      <button id="agenda-link" class="tile" type="button">
        <span class="tile-icon">🗓</span>
        <span class="tile-main">
          <span class="tile-label">My Agenda</span>
          <span class="tile-sub" id="agenda-link-sub">Today across all calendars</span>
        </span>
        <span class="tile-chevron">›</span>
      </button>
      <button id="europe-link" class="tile tile-europe" type="button">
        <span class="tile-icon">🇪🇺</span>
        <span class="tile-main">
          <span class="tile-label">European Vacation</span>
          <span class="tile-sub">Jul 18 → Aug 15 · 28 nights · 18 legs</span>
        </span>
        <span class="tile-chevron">›</span>
      </button>
    </div>
    <div id="actions-body">
      <div class="state loading">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </div>
  </main>

  <!-- View: Agenda -->
  <main id="view-agenda" class="view" hidden>
    <div id="agenda-body">
      <div class="state loading">
        <div class="spinner"></div>
        <p>Loading agenda…</p>
      </div>
    </div>
  </main>

  <!-- View: European Vacation (trip dashboard, pulled live from europe-trip-2026) -->
  <main id="view-europe" class="view" hidden>
    <div id="europe-body">
      <div class="state loading">
        <div class="spinner"></div>
        <p>Loading trip…</p>
      </div>
    </div>
  </main>

  <!-- View: Leg detail (any of legs 01..18, pulled live + injected) -->
  <main id="view-leg-detail" class="view" hidden>
    <div id="leg-detail-body">
      <div class="state loading">
        <div class="spinner"></div>
        <p>Loading leg…</p>
      </div>
    </div>
  </main>

  <template id="section-template">
    <section class="section">
      <h2 class="section-title">
        <span class="section-emoji"></span>
        <span class="section-label"></span>
        <span class="section-count"></span>
      </h2>
      <ul class="task-list"></ul>
    </section>
  </template>

  <template id="task-template">
    <li class="task">
      <button class="task-row" type="button">
        <span class="task-priority"></span>
        <span class="task-main">
          <span class="task-title"></span>
          <span class="task-meta">
            <span class="task-relative"></span>
          </span>
        </span>
        <span class="task-chevron">›</span>
      </button>
      <div class="task-expand" hidden>
        <p class="task-latest"></p>
        <p class="task-desc"></p>
        <div class="task-actions">
          <button type="button" class="task-action task-action-done" data-action="done">
            <span class="task-action-icon">✓</span>
            <span class="task-action-label">Mark done</span>
          </button>
          <a class="task-mc-link" target="_blank" rel="noopener">Open in Mission Control →</a>
        </div>
      </div>
    </li>
  </template>

  <template id="empty-template">
    <li class="task task-empty">
      <span></span>
    </li>
  </template>

  <template id="agenda-event-template">
    <li class="event">
      <div class="event-time">
        <span class="event-start"></span>
        <span class="event-end"></span>
      </div>
      <div class="event-body">
        <div class="event-title"></div>
        <div class="event-meta">
          <span class="event-source"></span>
          <span class="event-location"></span>
        </div>
      </div>
    </li>
  </template>

  <template id="europe-leg-template">
    <li class="trip-leg">
      <button class="trip-leg-row" type="button">
        <span class="trip-leg-stripe"></span>
        <span class="trip-leg-main">
          <span class="trip-leg-row1">
            <span class="trip-leg-icon"></span>
            <span class="trip-leg-when"></span>
            <span class="trip-leg-badge"></span>
          </span>
          <span class="trip-leg-title"></span>
          <span class="trip-leg-meta"></span>
        </span>
        <span class="trip-leg-chevron">›</span>
      </button>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
